# docker-compose.prod.yml — PRODUKCJA (serwer docelowy)
# Używa gotowego obrazu sms-server:latest załadowanego z tar
# Uruchom: docker compose -f docker-compose.prod.yml up -d
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sms-postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sms}
      POSTGRES_USER: ${POSTGRES_USER:-sms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sms-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sms} -d ${POSTGRES_DB:-sms}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Nie wystawiaj portu 5432 na zewnątrz w produkcji
    expose:
      - "5432"

  server:
    image: sms-server:latest
    container_name: sms-server
    env_file: .env
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-sms}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sms}?sslmode=disable"
      SERVER_ADDR: ":${SERVER_PORT:-8443}"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      DB_ENCRYPTION_KEY: ${DB_ENCRYPTION_KEY:?DB_ENCRYPTION_KEY must be set}
      UPLOAD_DIR: "/app/uploads"
      AGENTS_DIR: "/app/agents"
      MIGRATIONS_DIR: "file:///app/migrations"
      CA_CERT_FILE: "/app/certs/ca.crt"
      TLS_CERT_FILE: "/app/certs/server.crt"
      TLS_KEY_FILE: "/app/certs/server.key"
    volumes:
      - ./certs:/app/certs:ro
      - ./agents:/app/agents:ro
      - uploads:/app/uploads
    ports:
      - "${SERVER_PORT:-8443}:${SERVER_PORT:-8443}"
    networks:
      - sms-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

networks:
  sms-net:
    driver: bridge

volumes:
  postgres_data:
  uploads:
